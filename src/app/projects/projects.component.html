<div class="project-card">
    <div class="card-top">
        <span class="proj-status" [class]="'status-' + project.status.toLowerCase().replace(' ', '-')">
            {{ project.status }}
        </span>

    </div>
    <h3 class="proj-name">{{ project.name }}</h3>
    <p class="proj-desc">{{ project.shortDesc }}</p>
    <div class="tag-row">
        <span class="proj-tag" *ngFor="let tag of project.tags; trackBy: trackByIndex">{{ tag }}</span>
    </div>
</div>
