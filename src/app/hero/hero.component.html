<section class="hero-section" id="hero">

                <span class="pulse-dot"></span>
                Available for new projects
            </div>
            <div class="avatar-wrap">
                <img class="avatar" src="avatar/avatar.png" alt="Alessandro Grassi">
            </div>
            <p class="hero-name">Alessandro Grassi</p>
            <h1 class="hero-title">Web &amp; Mobile<br>Full Stack Developer</h1>

            <div class="hero-actions">
                <a href="/contact_me" class="btn-primary">Say Hello →</a>
