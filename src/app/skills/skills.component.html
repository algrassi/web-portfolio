<section class="skills-section" id="skills">
    <div class="container">
        <p class="section-label">What I do</p>
        <h2 class="section-title">Skills</h2>

        <div class="skills-layout">

            <!-- ── Hard Skills ─────────────────────────────────────────────── -->
            <div class="skill-card">
                <div class="card-title-row">
                    <div class="skill-icon">
                        <i class="fa-solid fa-code"></i>
                    </div>
                    <div>
                        <h3 class="skill-name">Hard Skills</h3>
                        <p class="skill-desc">Technical competencies built across 10+ years of hands-on development</p>
                    </div>
                </div>

                <div class="hard-groups">
                    <div class="skill-group" *ngFor="let group of hardSkillGroups; trackBy: trackByLabel">
                        <p class="group-label">{{ group.label }}</p>
                        <div class="tag-row">
                            <span class="skill-tag" *ngFor="let tag of group.tags; trackBy: trackByIndex">{{ tag }}</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Soft Skills ─────────────────────────────────────────────── -->
            <div class="skill-card">
                <div class="card-title-row">
                    <div class="skill-icon skill-icon--soft">
                        <i class="fa-solid fa-brain"></i>
                    </div>
                    <div>
                        <h3 class="skill-name">Soft Skills</h3>
                        <p class="skill-desc">How I work and grow alongside teams and challenges</p>
                    </div>
                </div>

                <div class="soft-grid">
                    <div class="soft-item" *ngFor="let skill of softSkills; trackBy: trackByIndex">
                        <span class="soft-icon">
                            <i class="fa-solid {{ skill.icon }}"></i>
                        </span>
                        <span class="soft-label">{{ skill.label }}</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
