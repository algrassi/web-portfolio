<section class="experience-section" id="experience">
    <div class="container">
        <p class="section-label">Career</p>
        <h2 class="section-title">Experience</h2>

        <div class="timeline">
            <div class="timeline-item" *ngFor="let exp of experiences; trackBy: trackByRole">
                <div class="timeline-marker">
                    <div class="dot" [class.dot-current]="exp.current"></div>
                </div>
                <div class="timeline-card">
                    <div class="card-header">
                        <div class="card-meta">
                            <span class="period">{{ exp.period }}</span>
                            <span class="location">
                                <i class="fa-solid fa-location-dot"></i> {{ exp.location }}
                            </span>
                        </div>
                        <span class="badge-current" *ngIf="exp.current">Current</span>
                    </div>
                    <h3 class="role">{{ exp.role }}</h3>
                    <p class="company" *ngIf="exp.company">{{ exp.company }}</p>
                    <p class="description">{{ exp.description }}</p>
                    <div class="tag-row">
                        <span class="skill-tag" *ngFor="let tag of exp.tags; trackBy: trackByIndex">{{ tag }}</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
